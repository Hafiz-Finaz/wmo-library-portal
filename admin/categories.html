<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Subject Categories - Admin Portal</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Scroll Progress Bar -->
  <div id="scroll-progress"></div>

  <!-- Animated Loading Screen -->
  <div id="loader-wrapper">
    <div class="loader-logo">WMO IG Library</div>
    <div class="spinner"></div>
  </div>

  <div class="admin-wrapper">
    
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <a href="/index.html" class="logo-wrapper">
          <i class="fas fa-book-reader logo-icon"></i>
          <span class="logo-text" style="font-size: 1.15rem;">WMO IG Admin</span>
        </a>
      </div>
      <ul class="sidebar-menu">
        <li><a href="/admin/index.html"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></a></li>
        <li><a href="/admin/books.html"><i class="fas fa-book"></i> <span>Books Catalog</span></a></li>
        <li class="active"><a href="/admin/categories.html"><i class="fas fa-tags"></i> <span>Categories</span></a></li>
        <li><a href="/admin/users.html"><i class="fas fa-users-cog"></i> <span>User Roles</span></a></li>
        <li><a href="/admin/reports.html"><i class="fas fa-file-invoice"></i> <span>Reports & Backup</span></a></li>
        <li><a href="/admin/settings.html"><i class="fas fa-cog"></i> <span>System Settings</span></a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="javascript:void(0)" onclick="window.handleLogout()"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
      </div>
    </aside>

    <!-- MAIN WINDOW -->
    <main class="admin-main">
      
      <!-- Top header bar -->
      <div class="admin-header">
        <div class="admin-header-title">
          <h2>Subject Categories & Icons</h2>
          <p>Organize academic subjects and map visual icons</p>
        </div>
        <div class="admin-header-actions">
          <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
        </div>
      </div>

      <div class="hero-container" style="min-height: auto; align-items: start; max-width: 1000px; margin: 0 auto; gap: 40px; grid-template-columns: 1fr 1fr;">
        
        <!-- Add Category Form -->
        <div class="glass-card" style="width: 100%; padding: 30px;">
          <h3 style="font-weight: 700; font-size: 1.25rem; margin-bottom: 20px;">Create New Category</h3>
          <form id="admin-add-category-form">
            <div class="admin-form-group">
              <label for="category-input-name">Category Name</label>
              <input type="text" id="category-input-name" class="admin-form-control" required placeholder="e.g. Malayalam Literature, Theology">
            </div>
            <div class="admin-form-group">
              <label for="category-input-icon">Font Awesome Icon Class</label>
              <input type="text" id="category-input-icon" class="admin-form-control" placeholder="e.g. fa-book, fa-globe, fa-history">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Category</button>
          </form>
        </div>

        <!-- Categories List Grid -->
        <div style="display: flex; flex-direction: column; gap: 20px; width: 100%;" id="admin-categories-list">
          <!-- Populated dynamically by admin.js -->
        </div>

      </div>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase/config.js"></script>
  <script src="/supabase/auth.js"></script>
  <script src="/supabase/database.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
