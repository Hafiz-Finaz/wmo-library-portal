<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Settings - Admin Portal</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Scroll Progress Bar -->
  <div id="scroll-progress"></div>

  <!-- Animated Loading Screen -->
  <div id="loader-wrapper">
    <div class="loader-logo">WMO IG Library</div>
    <div class="spinner"></div>
  </div>

  <div class="admin-wrapper">
    
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <a href="/index.html" class="logo-wrapper">
          <i class="fas fa-book-reader logo-icon"></i>
          <span class="logo-text" style="font-size: 1.15rem;">WMO IG Admin</span>
        </a>
      </div>
      <ul class="sidebar-menu">
        <li><a href="/admin/index.html"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></a></li>
        <li><a href="/admin/books.html"><i class="fas fa-book"></i> <span>Books Management</span></a></li>
        <li><a href="/admin/categories.html"><i class="fas fa-tags"></i> <span>Categories</span></a></li>
        <li><a href="/admin/messages.html"><i class="fas fa-envelope"></i> <span>Messages</span></a></li>
        <li class="active"><a href="/admin/settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="javascript:void(0)" onclick="window.handleLogout()"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
      </div>
    </aside>

    <!-- MAIN WINDOW -->
    <main class="admin-main">
      
      <!-- Top header bar -->
      <div class="admin-header">
        <div class="admin-header-title">
          <h2>Website Configuration</h2>
          <p>Update Digital Library portal configurations and name settings</p>
        </div>
        <div class="admin-header-actions">
          <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
        </div>
      </div>

      <!-- Settings Form Card -->
      <div class="glass-card" style="max-width: 800px; margin: 0 auto; padding: 30px;">
        <h3 style="font-weight: 700; font-size: 1.25rem; margin-bottom: 20px;"><i class="fas fa-sliders-h" style="color: var(--accent-primary); margin-right:10px;"></i> General Settings</h3>
        <form id="admin-settings-form">
          <div class="admin-form-group" style="margin-bottom: 20px;">
            <label for="setting-library-name">Library Portal Name</label>
            <input type="text" id="setting-library-name" class="admin-form-control" required placeholder="WMO Imam Gazzali Academy Library Council">
          </div>
          <button type="submit" class="btn btn-primary">Save Settings Configuration</button>
        </form>
      </div>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase/config.js"></script>
  <script src="/supabase/auth.js"></script>
  <script src="/supabase/database.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
