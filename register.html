<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - WMO Imam Gazzali Academy Library Council</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; background-image: radial-gradient(circle at 90% 10%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);">

  <!-- Header -->
  <header style="position: relative; border-bottom: 1px solid var(--border-color);">
    <div class="nav-container">
      <a href="/index.html" class="logo-wrapper">
        <i class="fas fa-book-reader logo-icon"></i>
        <span class="logo-text">WMO IG Library</span>
      </a>
      <a href="/index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Home</a>
    </div>
  </header>

  <!-- Register Form Main -->
  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    
    <div class="glass-card" style="width: 100%; max-width: 500px; padding: 35px;">
      <div class="text-center" style="margin-bottom: 25px;">
        <i class="fas fa-user-plus logo-icon" style="font-size: 2.5rem; margin-bottom: 12px;"></i>
        <h2 style="font-size: 1.8rem; font-weight: 800;">Create Account</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem; margin-top: 5px;">Register to access free academic E-books, papers, and reviews</p>
      </div>

      <form id="register-form">
        <div class="admin-form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" class="admin-form-control" required placeholder="Enter full name">
        </div>
        
        <div class="form-row">
          <div class="admin-form-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" class="admin-form-control" required placeholder="name@email.com">
          </div>
          <div class="admin-form-group">
            <label for="reg-phone">Phone Number</label>
            <input type="tel" id="reg-phone" class="admin-form-control" required placeholder="10-digit mobile">
          </div>
        </div>

        <div class="form-row">
          <div class="admin-form-group">
            <label for="reg-password">Password</label>
            <div style="position: relative;">
              <input type="password" id="reg-password" class="admin-form-control" required placeholder="Min 6 chars">
              <button type="button" class="btn-icon toggle-password" data-target="reg-password" style="position: absolute; right: 8px; top: 2px; width: 34px; height: 34px;" tabindex="-1">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="admin-form-group">
            <label for="reg-role">Account Type</label>
            <select id="reg-role" class="admin-form-control" required>
              <option value="student">Student</option>
              <option value="guest">Guest</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
        </div>

        <div class="admin-form-group" style="margin-top: 10px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="reg-terms" style="width: 18px; height: 18px; cursor: pointer;" required>
          <label for="reg-terms" style="margin: 0; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;">
            I agree to the Library Terms and Privacy Policy.
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px;">Create Account</button>
      </form>

      <div class="text-center" style="font-size: 0.95rem; color: var(--text-secondary);">
        Already have an account? <a href="/login.html" style="color: var(--accent-primary); font-weight: 600;">Sign in here</a>
      </div>
    </div>

  </main>

  <footer style="padding: 20px; text-align: center; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid var(--border-color);">
    &copy; 2026 WMO Imam Gazzali Academy Library Council.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase/config.js"></script>
  <script src="/supabase/auth.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
