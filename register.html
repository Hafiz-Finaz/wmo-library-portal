<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - WMO Imam Gazzali Academy Library Council</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; background-image: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.05) 0%, transparent 40%);">

  <!-- Header / Navigation Bar -->
  <header style="position: relative; border-bottom: 1px solid var(--border-color);">
    <div class="nav-container">
      <a href="/index.html" class="logo-wrapper">
        <i class="fas fa-book-reader logo-icon"></i>
        <span class="logo-text">WMO IG Library</span>
      </a>
      <a href="/index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Home</a>
    </div>
  </header>

  <!-- Main Container -->
  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    
    <!-- REGISTER CONTAINER -->
    <div class="glass-card" id="register-container" style="width: 100%; max-width: 500px; padding: 35px;">
      <div class="text-center" style="margin-bottom: 30px;">
        <i class="fas fa-user-plus logo-icon" style="font-size: 2.5rem; margin-bottom: 15px;"></i>
        <h2 style="font-size: 1.8rem; font-weight: 800;">Create Account</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem; margin-top: 5px;">Register to create your student or reader profile</p>
      </div>

      <form id="register-form">
        <div class="admin-form-group">
          <label for="register-name">Full Name</label>
          <input type="text" id="register-name" class="admin-form-control" required placeholder="Enter your full name">
        </div>
        
        <div class="admin-form-group">
          <label for="register-email">Academic Email</label>
          <input type="email" id="register-email" class="admin-form-control" required placeholder="name@wmoigacademy.com">
        </div>

        <div class="admin-form-group">
          <label for="register-phone">Phone Number (Optional)</label>
          <input type="tel" id="register-phone" class="admin-form-control" placeholder="e.g. +91 98765 43210">
        </div>

        <div class="admin-form-group">
          <label for="register-role">Library Role</label>
          <select id="register-role" class="admin-form-control" style="background: var(--bg-tertiary);">
            <option value="student">Student / Scholar</option>
            <option value="guest">Guest Reader</option>
          </select>
        </div>

        <div class="admin-form-group">
          <label for="register-password">Password</label>
          <div style="position: relative;">
            <input type="password" id="register-password" class="admin-form-control" required placeholder="Minimum 6 characters">
            <button type="button" class="btn-icon toggle-password" data-target="register-password" style="position: absolute; right: 10px; top: 2px; width: 36px; height: 36px;" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="admin-form-group" style="margin-bottom: 25px;">
          <label for="register-confirm">Confirm Password</label>
          <div style="position: relative;">
            <input type="password" id="register-confirm" class="admin-form-control" required placeholder="Repeat password">
            <button type="button" class="btn-icon toggle-password" data-target="register-confirm" style="position: absolute; right: 10px; top: 2px; width: 36px; height: 36px;" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px;">Sign Up</button>
      </form>

      <div class="text-center" style="font-size: 0.95rem; color: var(--text-secondary);">
        Already have an account? <a href="/login.html" style="color: var(--accent-primary); font-weight: 600;">Sign In</a>
      </div>
    </div>
  </main>

  <footer style="padding: 20px; text-align: center; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid var(--border-color);">
    &copy; 2026 WMO Imam Gazzali Academy Library Council. All rights reserved.
  </footer>

  <!-- Supabase & Authentication Hooks -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase/config.js"></script>
  <script src="/supabase/auth.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
